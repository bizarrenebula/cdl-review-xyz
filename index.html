<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Der Code des Lebens — Rad der 12 Lebensprinzipien (Originaltexte)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Spectral:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --sky:        #100e26;
    --sky-deep:   #0a0819;
    --brass:      #d3a95f;
    --brass-dim:  #8a7040;
    --parchment:  #f0e6cf;
    --ink:        #2a2338;
    --ring-outer: #1c1840;
    --ring-inner: #262052;
    --hub:        #14112e;
    /* 4 principle colours from the book */
    --c-red:    #ff4d5e;
    --c-green:  #1fa845;
    /* the answer's ink: aged gold on parchment, and its lit peak */
    --gold-ink: #e8c176;
    --gold-lit: #ffeab8;
    --c-yellow: #ffd84d;
    --c-violet: #b477ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, #232052 0%, transparent 60%),
      var(--sky);
    color: var(--parchment);
    font-family: 'Spectral', Georgia, serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .stars span {
    position: absolute; width: 2px; height: 2px;
    background: var(--parchment); border-radius: 50%;
    opacity: .5; animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.6} }
  @media (prefers-reduced-motion: reduce) {
    .stars span { animation: none; }
    * { transition: none !important; }
  }

  /* ---- language switch ---- */
  .lang-switch {
    position: fixed; top: .9rem; right: .9rem; z-index: 5;
    display: flex; gap: .3rem;
  }
  .lang-switch button {
    font-family: 'Spectral', serif;
    font-size: .72rem; letter-spacing: .12em;
    padding: .35em .7em;
    background: rgba(20,17,46,.7);
    border: 1px solid var(--brass-dim);
    border-radius: 2rem;
    color: #b9aed9; cursor: pointer;
    transition: all .2s;
  }
  .lang-switch button.active,
  .lang-switch button:hover { background: var(--brass); color: var(--sky-deep); border-color: var(--brass); }

  /* The sound toggle sits opposite the languages, quiet until you look for it.
     Three bars that stand still when muted and drift when the drone is on. */
  .sound {
    position: fixed; top: .9rem; left: .9rem; z-index: 5;
    display: flex; align-items: center; gap: .42rem;
    padding: .42em .8em .42em .7em;
    background: rgba(20,17,46,.7);
    border: 1px solid var(--brass-dim); border-radius: 2rem;
    color: #b9aed9; cursor: pointer;
    font-family: 'Spectral', serif; font-size: .68rem; letter-spacing: .12em;
    transition: color .3s, border-color .3s, background .3s;
  }
  .sound:hover, .sound:focus-visible { outline: none; border-color: var(--brass); color: var(--parchment); }
  .sound i { display: flex; align-items: flex-end; gap: 2px; height: .7rem; }
  .sound i b {
    display: block; width: 2px; height: 30%;
    background: currentColor; border-radius: 1px;
    transition: height .35s ease;
  }
  .sound.on { color: var(--brass); border-color: var(--brass-dim); }
  .sound.on i b { animation: sound-bar 2.6s ease-in-out infinite; }
  .sound.on i b:nth-child(2) { animation-duration: 3.4s; animation-delay: -.9s; }
  .sound.on i b:nth-child(3) { animation-duration: 4.1s; animation-delay: -1.7s; }
  @keyframes sound-bar {
    0%, 100% { height: 28%; }
    50%      { height: 100%; }
  }
  @media (prefers-reduced-motion: reduce) { .sound.on i b { animation: none; height: 62%; } }
  @media (max-width: 520px) { .sound span { display: none; } .sound { padding: .45em .6em; } }

  header { text-align: center; padding: 1.4rem 1rem .4rem; z-index: 1; }
  header h1 {
    font-family: 'Marcellus', serif; font-weight: 400;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--gold-ink);
    /* Breathes on the same 3.2s as the answer in the ball, and starts on the
       same beat, so the title and the result pulse together. */
    text-shadow: 0 1px 3px rgba(4,3,14,.9), 0 0 18px rgba(211,169,95,.5);
    animation: title-breathe 3.2s ease-in-out 1s infinite;
  }
  @keyframes title-breathe {
    0%, 100% { color: var(--gold-ink);
               text-shadow: 0 1px 3px rgba(4,3,14,.9), 0 0 18px rgba(211,169,95,.5); }
    50%      { color: var(--gold-lit);
               text-shadow: 0 1px 3px rgba(4,3,14,.9), 0 0 26px rgba(255,214,140,.85),
                            0 0 52px rgba(211,169,95,.6); }
  }
  @media (prefers-reduced-motion: reduce) {
    header h1 { animation: none; }
  }
  header p {
    margin-top: .5rem; font-size: .92rem; font-weight: 300; font-style: italic;
    color: #b9aed9; max-width: 36rem; margin-inline: auto;
  }

  /* The stage is the wheel's own box; the counting ring sits outside it, in
     the margin left here for it (see `svg { overflow: visible }` below). So
     the numbers cost the wheel about a tenth of its diameter and the whole
     composition still takes up what it always did. */
  .stage {
    position: relative;
    width: min(84vw, 580px, 66vh); aspect-ratio: 1;
    margin: .6rem auto; z-index: 1;
    touch-action: none;
  }

  /* Roomier spacing on larger (desktop) screens */
  @media (min-width: 760px) {
    header { padding: 2.6rem 1rem 1rem; }
    header p { margin-top: .9rem; }
    .stage { margin: 1.8rem auto; }
  }
  /* The outer ring reaches r=344 in a 700-unit viewBox, so its halo — and the
     counting ring past it — would be clipped flat by the SVG viewport. Let
     them spill over the edge. */
  svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .ring-group { cursor: grab; }
  .ring-group:active { cursor: grabbing; }
  /* Promoted only while turning: a permanent layer would cost memory for a
     filtered subtree that is usually still. */
  body.spinning .ring-group { will-change: transform; }

  .sector-outer, .sector-inner {
    fill: var(--ring-outer);
    stroke: var(--seg-color, var(--brass-dim));
    stroke-width: 2.4;
    stroke-linejoin: round;
    /* neon: the coloured stroke emits light */
    filter: drop-shadow(0 0 3px var(--seg-color)) drop-shadow(0 0 7px var(--seg-color));
    transition: fill .3s, stroke-width .3s, filter .3s;
  }
  .sector-inner { fill: var(--ring-inner); }
  .sector-outer.active { fill: #3a2f6e; }
  .sector-inner.active { fill: #4a3a86; }

  /* Selected segments burn brighter than the rest of the ring */
  .sector-outer.active, .sector-inner.active {
    stroke-width: 3.2;
    filter:
      drop-shadow(0 0 1.5px #fff)
      drop-shadow(0 0 4.5px var(--seg-color))
      drop-shadow(0 0 10.5px var(--seg-color))
      drop-shadow(0 0 19.5px var(--seg-color));
  }

  /* ============ THE MARKER ============================================
     One gesture for "look here", used everywhere on the page: a white border
     swells around the thing and falls back. Add the class `mark-pulse` to any
     element for one beat; JS side is markPulse(el, delay) in the MARKER
     section, which handles the timing and the cleanup.

       markPulse(document.querySelector('#readMoreBtn'));   // any element
       markPulse(sectorEl, 480);                            // any SVG shape

     Two flavours, picked by what the element is, because a border means a
     different property in each world:
       · SVG shapes  -> the stroke itself brightens and thickens.
       · HTML boxes  -> an outline swells and drifts outward as it fades.
     Outline is deliberate: it follows border-radius, is not clipped by the
     element's own overflow, and leaves box-shadow free for whatever the
     element already uses it for (the hub's breathing, for one). */
  :root { --mark-ms: 1.05s; }

  /* Only the mid-frame is declared, so the start and end values are the
     element's own — the same flare reads correctly on an already-glowing
     sector and on a dim one, with nothing to snap back from. */
  @keyframes mark-stroke {
    45% {
      stroke: #fff7e4;
      stroke-width: var(--mark-w, 5.4);
      filter:
        drop-shadow(0 0 2px #fff)
        drop-shadow(0 0 8px var(--seg-color, #d3a95f))
        drop-shadow(0 0 18px var(--seg-color, #d3a95f))
        drop-shadow(0 0 30px var(--seg-color, #d3a95f));
    }
  }
  @keyframes mark-ring {
    0%   { outline-color: rgba(255,247,228,0);   outline-width: 1px; outline-offset: 1px; }
    45%  { outline-color: rgba(255,247,228,.92); outline-width: 3px; outline-offset: 3px; }
    100% { outline-color: rgba(255,247,228,0);   outline-width: 3px; outline-offset: 9px; }
  }
  .mark-pulse {
    outline: 1px solid transparent;
    animation: mark-ring var(--mark-ms) ease-in-out;
  }
  svg .mark-pulse { outline: none; animation-name: mark-stroke; }

  /* A third flavour, for an element that has box-shadow to spare: the same
     ring, but as a spread shadow, which carries a real halo the way outline
     cannot — and which lands on phone browsers that will not round an outline
     to a border-radius. Opt in with `mark-glow` alongside `mark-pulse`. */
  @keyframes mark-ring-glow {
    0%   { box-shadow: 0 0 0 1px rgba(255,247,228,0),
                       0 0 8px 0 rgba(255,247,228,0); }
    45%  { box-shadow: 0 0 0 3px rgba(255,247,228,.92),
                       0 0 26px 7px rgba(255,240,214,.45); }
    100% { box-shadow: 0 0 0 9px rgba(255,247,228,0),
                       0 0 34px 12px rgba(255,240,214,0); }
  }
  .mark-glow.mark-pulse { outline: none; animation-name: mark-ring-glow; }

  /* A fourth flavour, for the words in a wedge. A glyph has no border to swell
     — thicken its stroke and it stops being legible — so here the ink itself
     catches the light. The stroke is left alone: a label's dark stroke is what
     keeps it readable
     over the ring, and brightening that would erase the letterforms just as
     the eye arrives. Only the fill lifts, and the glow behind it. */
  @keyframes mark-word {
    45% {
      fill: #fff;
      filter:
        drop-shadow(0 0 4px rgba(255,250,238,.7))
        drop-shadow(0 0 14px var(--seg-color, #d3a95f))
        drop-shadow(0 0 30px var(--seg-color, #d3a95f));
    }
  }
  .mark-word.mark-pulse { animation-name: mark-word; }
  /* The words settle back on their own clock, slower than they lit, so the
     light reads as one movement passing along rather than a switch. */
  .label-outer, .label-inner { transition: fill .5s ease, filter .5s ease; }

  /* ---- The marker's other half: one light running the whole way round a
     group of things, to say they belong together. The path is built in JS
     (markSweepPath) because it traces the union of the two chosen wedges and
     the ball; here it is only lit and moved. pathLength=100 in the markup, so
     the dash numbers below are percentages of the outline however big it is. */
  #markSweep path {
    fill: none;
    stroke: #fff7e4;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 22 78;
    opacity: 0;
    pointer-events: none;
    filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 12px rgba(211,169,95,.9));
  }
  #markSweep.run path { animation: mark-sweep .95s cubic-bezier(.35,0,.25,1); }
  @keyframes mark-sweep {
    0%   { opacity: 0; stroke-dashoffset: 122; }
    12%  { opacity: 1; }
    82%  { opacity: 1; }
    100% { opacity: 0; stroke-dashoffset: 0; }
  }

  /* ---- The counting ring ------------------------------------------------
     The twelve principle numbers used to be struck into the wedges, one set
     per wheel, each of them lighting up with its sector — twenty-four numerals
     competing with the words printed over them. They live outside the wheel
     now: a single scale on its own circle, clear of the rim and of the
     needle's tip, reading whichever wheel the hand last touched and turning
     with it (see numTrack in the JS). Nothing here lights up. It is the ruler
     the wheel is read against, not another thing on the wheel. */
  .num-ring { transition: opacity .18s ease; }
  .num-ring.switching { opacity: 0; }            /* while it changes wheels */
  .wheel-num {
    font-family: 'Marcellus', serif;
    font-size: 23px;
    fill: var(--brass);
    fill-opacity: .85;
    text-anchor: middle;
    pointer-events: none; user-select: none;
  }
  /* User units, so the numerals shrink with the wheel — on a phone that is a
     ten-pixel numeral. A little more size buys them back. */
  @media (max-width: 520px) { .wheel-num { font-size: 27px; } }

  /* Label text: whitish, with a dark shadow acting as a readable border */
  .label-outer, .label-inner {
    fill: #fbf7ec;
    font-family: 'Marcellus', serif;
    text-anchor: middle;
    paint-order: stroke fill;
    stroke: rgba(6,4,16,.92);
    stroke-width: 3px;
    pointer-events: none; user-select: none;
  }
  .label-outer { font-size: 15.5px; letter-spacing: .04em; }
  .label-inner { font-size: 13px; }
  .active-label { fill: #fff; }

  /* ============ THE CRYSTAL BALL ============
     Glass sphere: a dark refracting interior, mist drifting inside it, and a
     specular sheen laid over the top so the text reads as if suspended within. */
  .hub {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 42%; height: 42%; border-radius: 50%;
    overflow: hidden; isolation: isolate;
    /* No specular flares — the sphere is modelled by shading alone: light from
       the upper left, falling off to a dark rim, with a little bounce below. */
    background:
      radial-gradient(circle at 38% 30%,
        #3b3170 0%, #2a2358 22%, #1c1848 48%, #120f31 74%, #08061a 100%),
      var(--hub);
    border: 1px solid rgba(255,240,214,.66);
    /* The last three shadows are the ball's answer to a selected sector: a
       white hairline over the rim and two gold halos, so the centre reads as
       lit in the same register as the two chosen wedges. */
    box-shadow:
      inset 0 0 42px rgba(6,4,18,.9),          /* rim shadow: rounds the ball */
      inset -10px -12px 34px rgba(6,4,18,.55), /* terminator, away from the light */
      inset 0 -14px 30px rgba(180,119,255,.13),/* bounce light off the base */
      0 0 30px rgba(0,0,0,.6),
      0 0 2px rgba(255,255,255,.5),
      0 0 14px rgba(211,169,95,.45),
      0 0 34px rgba(211,169,95,.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 4%; gap: .35rem;
  }
  /* Text and button ride above the mist, below the glass sheen. */
  .hub .result, .hub button { position: relative; z-index: 2; }

  /* ---- mist curling inside the sphere ---- */
  .hub-mist {
    position: absolute; inset: -18%; z-index: 0;
    pointer-events: none; opacity: .5;
    filter: blur(14px);
    transition: opacity .8s ease;
  }
  .hub-mist span {
    position: absolute; display: block; border-radius: 50%;
    mix-blend-mode: screen;
    transform-origin: 50% 50%;
    will-change: transform;
  }
  .hub-mist span:nth-child(1) {
    inset: 8% 20% 30% 8%;
    background: radial-gradient(circle, rgba(180,119,255,.75), transparent 68%);
    animation: mist-a 19s ease-in-out infinite;
  }
  .hub-mist span:nth-child(2) {
    inset: 26% 6% 10% 28%;
    background: radial-gradient(circle, rgba(77,255,200,.4), transparent 66%);
    animation: mist-b 25s ease-in-out infinite;
  }
  .hub-mist span:nth-child(3) {
    inset: 20% 24% 24% 22%;
    background: radial-gradient(circle, rgba(255,216,120,.42), transparent 62%);
    animation: mist-c 31s ease-in-out infinite;
  }
  @keyframes mist-a {
    0%,100% { transform: translate(0,0) scale(1); }
    33%     { transform: translate(12%, 9%) scale(1.18); }
    66%     { transform: translate(-9%, 6%) scale(.9); }
  }
  @keyframes mist-b {
    0%,100% { transform: translate(0,0) scale(1.05); }
    40%     { transform: translate(-13%, -8%) scale(.88); }
    75%     { transform: translate(7%, -12%) scale(1.2); }
  }
  @keyframes mist-c {
    0%,100% { transform: translate(0,0) scale(.95) rotate(0deg); }
    50%     { transform: translate(6%, -6%) scale(1.22) rotate(180deg); }
  }

  /* Depth pooled behind the words, so the text has something dark to sit on. */
  .hub::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    z-index: 1; pointer-events: none;
    background: radial-gradient(circle at 50% 50%,
      rgba(5,4,16,.66) 0%, rgba(5,4,16,.45) 40%, transparent 72%);
  }

  /* ---- Result reveal: a hairline of light draws once around the rim while the
         text resolves out of a blur. Quiet, no fireworks. ---- */
  .hub-reveal {
    position: absolute; inset: 0; border-radius: 50%; z-index: 1;
    pointer-events: none; overflow: hidden;
  }
  /* The ball clouds over while it answers. */
  .hub.pulse .hub-mist { opacity: .95; transition: opacity .35s ease; }
  /* Outer element carries the annulus (the rim); inner one carries the sweep,
     so each animates a single, simple mask. */
  .hub-reveal .rim {
    position: absolute; inset: 0; border-radius: 50%; opacity: 0;
    -webkit-mask: radial-gradient(closest-side, transparent calc(100% - 2.5px), #000 calc(100% - 1.5px));
            mask: radial-gradient(closest-side, transparent calc(100% - 2.5px), #000 calc(100% - 1.5px));
  }
  .hub-reveal .rim i {
    position: absolute; inset: 0; display: block; border-radius: 50%;
    background: conic-gradient(from -90deg,
      rgba(211,169,95,.55), #fff4d6 45%, rgba(211,169,95,.55));
    -webkit-mask: conic-gradient(from -90deg, #000 0deg, #000 0deg, transparent 14deg);
            mask: conic-gradient(from -90deg, #000 0deg, #000 0deg, transparent 14deg);
  }
  /* A breath of light lifting off the centre as the rim closes. */
  .hub-reveal .veil {
    position: absolute; inset: 0; border-radius: 50%; opacity: 0;
    background: radial-gradient(circle at 50% 50%,
      rgba(255,241,209,.22), rgba(211,169,95,.1) 45%, transparent 72%);
  }

  /* Once a pairing has been chosen the hub keeps breathing, so the centre stays
     the warmest thing on the board. */
  .hub.lit { animation: hub-breathe 4.5s ease-in-out infinite; }
  @keyframes hub-breathe {
    0%, 100% { box-shadow:
                 inset 0 0 34px rgba(8,6,22,.85),
                 inset 0 -14px 30px rgba(180,119,255,.16),
                 inset 0 10px 26px rgba(214,226,255,.07),
                 0 0 30px rgba(0,0,0,.6),
                 0 0 2px rgba(255,255,255,.5),
                 0 0 14px rgba(211,169,95,.45),
                 0 0 34px rgba(211,169,95,.3); }
    50%      { box-shadow:
                 inset 0 0 30px rgba(8,6,22,.7),
                 inset 0 -18px 38px rgba(180,119,255,.3),
                 inset 0 10px 26px rgba(214,226,255,.1),
                 0 0 30px rgba(0,0,0,.6),
                 0 0 3px rgba(255,255,255,.62),
                 0 0 20px rgba(211,169,95,.6),
                 0 0 52px rgba(211,169,95,.42); }
  }

  /* The ball cannot wear the marker itself: .lit already owns its `animation`
     property for the breathing, and a second one would replace it. So the
     marker goes on a bare ring laid over the ball — same circle, nothing in
     it, nothing else animating it. (The general rule for the marker: if the
     target already animates, mark an overlay instead of the element.) */
  .hub-ring {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 42%; height: 42%; border-radius: 50%;
    pointer-events: none; z-index: 3;
  }

  .hub.pulse .rim   { animation: rim-fade 1.15s linear; }
  .hub.pulse .rim i { animation: rim-draw .95s cubic-bezier(.4,0,.15,1); }
  .hub.pulse .veil  { animation: veil-lift 1.1s ease-out .18s; }

  /* Letters arrive one by one, each flaring as it lands, like text writing
     itself onto the page of a spellbook. */
  /* The fit chooses the breaks, so each line is its own row and must not wrap. */
  .hub .result .line { display: block; white-space: nowrap; }
  .hub .result .ch {
    display: inline-block; white-space: pre;
    /* Land, then breathe. The glow is listed second and starts after the
       reveal, so it takes over the text-shadow once it begins. */
    animation:
      letter-in .34s cubic-bezier(.2,.7,.3,1) both,
      result-breathe 3.2s ease-in-out 1s infinite;
  }
  /* Each letter condenses out of the mist rather than being typed. */
  @keyframes letter-in {
    0%   { opacity: 0; filter: blur(7px); transform: translateY(3px) scale(1.4);
           color: #fff6e2; text-shadow: 0 0 16px rgba(255,238,198,.95), 0 0 30px rgba(150,110,255,.8); }
    55%  { opacity: 1; filter: blur(0); transform: none;
           color: #fff6e2;
           text-shadow: 0 1px 3px rgba(4,3,14,.9), 0 0 11px rgba(255,238,198,.85),
                        0 0 24px rgba(150,110,255,.5); }
    100% { opacity: 1; filter: blur(0); transform: none;
           color: var(--gold-ink);
           text-shadow: 0 1px 3px rgba(4,3,14,.95), 0 0 6px rgba(4,3,14,.9),
                        0 0 15px rgba(211,169,95,.5); }
  }
  /* The answer keeps glowing, slow enough to read as breathing rather than
     blinking. Starts from letter-in's end state so the handover is seamless. */
  @keyframes result-breathe {
    0%, 100% { color: var(--gold-ink);
               text-shadow: 0 1px 3px rgba(4,3,14,.95), 0 0 6px rgba(4,3,14,.9),
                            0 0 15px rgba(211,169,95,.5); }
    50%      { color: var(--gold-lit);
               text-shadow: 0 1px 3px rgba(4,3,14,.95), 0 0 8px rgba(4,3,14,.9),
                            0 0 20px rgba(255,214,140,.85), 0 0 40px rgba(211,169,95,.6); }
  }

  @keyframes rim-fade {
    0% { opacity: 0; } 8% { opacity: 1; } 62% { opacity: 1; } 100% { opacity: 0; }
  }
  @keyframes rim-draw {
    from { -webkit-mask: conic-gradient(from -90deg, #000 0deg, #000 0deg, transparent 14deg);
                   mask: conic-gradient(from -90deg, #000 0deg, #000 0deg, transparent 14deg); }
    to   { -webkit-mask: conic-gradient(from -90deg, #000 0deg, #000 360deg, transparent 374deg);
                   mask: conic-gradient(from -90deg, #000 0deg, #000 360deg, transparent 374deg); }
  }
  @keyframes veil-lift {
    0%   { opacity: 0; transform: scale(.72); }
    40%  { opacity: 1; }
    100% { opacity: 0; transform: scale(1.06); }
  }
  @media (prefers-reduced-motion: reduce) {
    .hub.pulse .rim, .hub.pulse .rim i, .hub.pulse .veil, .hub .result .ch {
      animation: none;
    }
    /* No breathing or drifting mist, but keep the lit ball brighter at rest. */
    .hub-mist span { animation: none; }

let lang = 'de';
const T  = () => I18N[lang].ui;
const LP = () => I18N[lang].lp;

/* ================= GEOMETRY ================= */

const LP_COLORS = ['var(--c-red)','var(--c-green)','var(--c-yellow)','var(--c-violet)'];
const CX = 350, CY = 350;
const OUTER_R1 = 252, OUTER_R2 = 344;
const INNER_R1 = 164, INNER_R2 = 252;
const STEP = 30;

const svg = document.getElementById('wheel');
const outerG = document.getElementById('outerRing');
const innerG = document.getElementById('innerRing');
const numRingG = document.getElementById('numRing');

function polar(r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
}
function sectorPath(r1, r2, a1, a2) {
  const [x1,y1] = polar(r2,a1), [x2,y2] = polar(r2,a2);
  const [x3,y3] = polar(r1,a2), [x4,y4] = polar(r1,a1);
  return `M ${x1} ${y1} A ${r2} ${r2} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${r1} ${r1} 0 0 0 ${x4} ${y4} Z`;
}
/* ---- Fitting a label into its wedge -----------------------------------
   Everything here is in SVG user units, so one fit serves every screen: the
   viewBox scales the whole wheel, and text that clears the wedge at 700 units
   clears it at any rendered size.

   Each line is set on an arc concentric with the ring, so a line's room is
   simply the arc it sits on — length r·30° — and it needs its cap height to
   clear both the inner and outer arc. Curved text has no corners to catch on
   the rim, which is what a straight line had to be shrunk for. */

const NS = 'http://www.w3.org/2000/svg';
const XLINK = 'http://www.w3.org/1999/xlink';
const WEDGE_RAD = STEP * Math.PI / 180;    // angular width of one sector
const LBL_PAD = 9;          // clearance from the two arcs, user units
const LBL_LEAD = 1.12;      // line spacing, as a multiple of the font size
const LBL_HALFCAP = .38;    // half the cap height, in em
const LBL_SIDE = .88;       // fraction of the arc the line may use
const LBL_EASE = .95;       // final trim, so nothing sits tight to an edge

let measurer = null;
const textWidths = new Map();

/* Advance width of a string at font-size 100, in user units. Uses a hidden
   node with the real class so letter-spacing counts. */
function textWidth100(text, cls) {
  const key = cls + '|' + text;
  if (textWidths.has(key)) return textWidths.get(key);
  if (!measurer) {
    measurer = document.createElementNS(NS, 'text');
    measurer.setAttribute('visibility', 'hidden');
    measurer.setAttribute('x', -9999);
    svg.appendChild(measurer);
  }
  measurer.setAttribute('class', cls);
  measurer.style.fontSize = '100px';
  measurer.textContent = text;
  const w = measurer.getComputedTextLength();
  textWidths.set(key, w);
  return w;
}

/* Lines are costed by summing their atoms rather than measuring every candidate
   string, which keeps the search to a handful of measurements. `measure` gives
   a string's width at font-size 100 — the SVG labels measure with a hidden text
   node, the hub with a canvas; everything below works off either. */
function spaceWidth100(measure) {
  return measure('n n') - 2 * measure('n');
}

/* ---- Hyphenation ----
   Break between the vowel groups of a word: a lone consonant goes with the
   following syllable (Kommuni-kation), and out of a cluster only the last
   consonant travels (Selbst-verwirk-lichung, Mitar-beiter). That is the German
   rule, and it behaves for English and Cyrillic too. Both halves keep at least
   HYPH_EDGE letters, which is what stops orphans like "…bei-/ter". */
const VOWELS = 'aeiouyäöüàáâãåæèéêëìíîïòóôõøùúûаеёиоуыэюяіїє';
const DIGRAPHS = ['sch', 'ch', 'ph', 'th', 'sh', 'ck'];   // never split these
const HYPH_MIN = 9;      // shorter words are never broken
const HYPH_EDGE = 4;     // letters that must stay on each side
const HYPH_PIECES = 3;   // most pieces one word may become
const HYPH_GAIN = 1.12;  // only hyphenate if it buys this much size

function hyphenPoints(word) {
  const w = word.toLowerCase();
  const isV = c => VOWELS.includes(c);
  const pts = [];
  let i = 0;
  while (i < w.length) {
    if (!isV(w[i])) { i++; continue; }
    let j = i; while (j < w.length && isV(w[j])) j++;      // end of the vowels
    let k = j; while (k < w.length && !isV(w[k])) k++;     // end of the consonants
    if (k < w.length && k > j) {
      /* What travels to the next line: a trailing digraph whole, else the one
         last consonant. Without this, Partner-schaft breaks as Partnersc-haft. */
      const cluster = w.slice(j, k);
      let onset = 1;
      for (const d of DIGRAPHS) if (cluster.endsWith(d)) { onset = d.length; break; }
      const cut = Math.max(j, k - onset);
      if (cut >= HYPH_EDGE && word.length - cut >= HYPH_EDGE) pts.push(cut);
    }
    i = j;
  }
  if (pts.length <= HYPH_PIECES - 1) return pts;
  const keep = [];                          // thin out, keeping them spread
  for (let n = 1; n <= HYPH_PIECES - 1; n++) {
    keep.push(pts[Math.round((pts.length - 1) * n / HYPH_PIECES)]);
  }
  return [...new Set(keep)];
}

/* A label as the smallest pieces a line may end on. `brk` says how the piece
   joins the one before it: a space between words, a hyphen inside one. */
function atomize(name, hyphenate, measure) {
  const atoms = [];
  name.split(/\s+/).filter(Boolean).forEach((word, wi) => {
    const pts = hyphenate && word.length >= HYPH_MIN ? hyphenPoints(word) : [];
    let start = 0;
    const pieces = [];
    for (const p of pts) { pieces.push(word.slice(start, p)); start = p; }
    pieces.push(word.slice(start));
    pieces.forEach((t, pi) => atoms.push({
      t, w: measure(t),
      brk: pi > 0 ? 'hyphen' : (wi > 0 ? 'space' : 'none')
    }));
  });
  return atoms;
}

/* Atoms [from, to) as one line, carrying its own width. A line that stops
   mid-word takes the hyphen — and the hyphen's width. */
function lineOf(atoms, from, to, measure) {
  let text = '', w = 0;
  for (let k = from; k < to; k++) {
    if (k > from && atoms[k].brk === 'space') { text += ' '; w += spaceWidth100(measure); }
    text += atoms[k].t;
    w += atoms[k].w;
  }
  if (to < atoms.length && atoms[to].brk === 'hyphen') {
    text += '-';
    w += measure('-');
  }
  return { text, w };
}

/* Every way of breaking the atoms into `n` contiguous lines. */
function lineSplits(atoms, n, measure) {
  if (n === 1) return [[lineOf(atoms, 0, atoms.length, measure)]];
  const out = [];
  for (let i = 1; i <= atoms.length - n + 1; i++) {
    const head = lineOf(atoms, 0, i, measure);
    for (const rest of lineSplits(atoms.slice(i), n - 1, measure)) out.push([head, ...rest]);
  }
  return out;
}

/* Radius of line `j` in a block of `n` lines centred at `c`. Line 0 is the
   outermost, so the text reads outside-in like the rest of the wheel. */
function lineRadius(c, n, j, size) {
  const lead = LBL_LEAD * size;
  return c + lead * n / 2 - (j + .5) * lead;
}

/* Can this block sit at radius `c` (its centre) at this size? */
function blockFits(lines, size, c, r1, r2) {
  const rIn = r1 + LBL_PAD, rOut = r2 - LBL_PAD, capH = LBL_HALFCAP * size;
  for (let j = 0; j < lines.length; j++) {
    const rj = lineRadius(c, lines.length, j, size);
    if (rj - capH < rIn || rj + capH > rOut) return false;   // through an arc
    if (lines[j].w * size / 100 > rj * WEDGE_RAD * LBL_SIDE) return false;
  }
  return true;
}

/* The block is centred on the ring's mid-radius, full stop — a size only
   counts as fitting if it fits there. Letting it drift outwards would buy a
   larger face (the arc is longer further out) at the cost of labels sitting
   at different depths around the wheel. Horizontal centring is the arc's own:
   every line is anchored at startOffset 50%. */
function placeBlock(lines, size, r1, r2) {
  const mid = (r1 + r2) / 2;
  return blockFits(lines, size, mid, r1, r2) ? mid : null;
}

/* Biggest type that fits, over every line breaking up to LBL_MAXLINES. */
const LBL_MAXLINES = 3;
/* Left alone, "Mutter" would set at 48 and "Selbstverwirklichung" at 12 — each
   sector full, the ring a mess. So the ring's tightest label sets a floor and
   nothing is allowed to exceed it by more than this. */
const LBL_SPREAD = 1.45;

function searchFit(atoms, r1, r2, measure) {
  let best = { size: 0, lines: [lineOf(atoms, 0, atoms.length, measure)], center: (r1 + r2) / 2 };
  for (let n = 1; n <= Math.min(LBL_MAXLINES, atoms.length); n++) {
    for (const lines of lineSplits(atoms, n, measure)) {
      let lo = 5, hi = 48, at = null;
      for (let i = 0; i < 11; i++) {
        const mid = (lo + hi) / 2;
        const c = placeBlock(lines, mid, r1, r2);
        if (c === null) hi = mid; else { lo = mid; at = c; }
      }
      if (at !== null && lo > best.size) best = { size: lo, lines, center: at };
    }
  }
  return best;
}

/* Plain word breaking first. Hyphenation is only worth the ugliness when it
   buys real size, so it has to beat the plain fit by HYPH_GAIN — otherwise
   "Mutter" would happily set itself as "Mut-/ter" to gain a few points. */
function fitLabel(name, r1, r2, cls) {
  const measure = t => textWidth100(t, cls);
  let best = searchFit(atomize(name, false, measure), r1, r2, measure);
  if (name.split(/\s+/).some(w => w.length >= HYPH_MIN)) {
    const hyph = searchFit(atomize(name, true, measure), r1, r2, measure);
    if (hyph.size > best.size * HYPH_GAIN) best = hyph;
  }
  if (!best.size) best.size = 6;   // nothing fit: set it small and let it be
  best.size *= LBL_EASE;
  return best;
}

function buildRing(group, ring) {
  const ns = 'http://www.w3.org/2000/svg';
  const isOuter = ring === 'outer';
  const [r1, r2] = isOuter ? [OUTER_R1, OUTER_R2] : [INNER_R1, INNER_R2];

  /* Fit every label first: the tightest one in the ring caps the rest. */
  const cls = isOuter ? 'label-outer' : 'label-inner';
  const fits = LP().map(item => fitLabel(isOuter ? item.label : item.area, r1, r2, cls));
  /* The floor comes from the second-tightest label, not the tightest: one
     unbreakable word (Selbstverwirklichung) would otherwise drag the whole
     ring down to its size. That one label stays smaller than the rest. */
  const sorted = fits.map(f => f.size).sort((a, b) => a - b);
  const cap = (sorted[1] ?? sorted[0]) * LBL_SPREAD;
  fits.forEach(f => {
    if (f.size <= cap) return;
    f.size = cap;
    f.center = placeBlock(f.lines, cap, r1, r2) ?? f.center;
  });

  group.innerHTML = '';
  raised[ring] = -1;            // DOM order is rebuilt, so drop the cached lift
  const defs = document.createElementNS(NS, 'defs');   // holds the label arcs
  group.appendChild(defs);
  LP().forEach((item, i) => {
    const start = i * STEP - STEP / 2, end = i * STEP + STEP / 2;
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', sectorPath(r1, r2, start, end));
    path.setAttribute('class', isOuter ? 'sector-outer' : 'sector-inner');
    path.dataset.index = i;
    path.style.setProperty('--seg-color', LP_COLORS[i % 4]);
    group.appendChild(path);

    /* Label: one arc per line, each concentric with the ring, so the words
       curve with the wheel instead of sitting flat across it. */
    const fit = fits[i];
    fit.lines.forEach((line, li) => {
      const rj = lineRadius(fit.center, fit.lines.length, li, fit.size);
      const id = `lblarc-${ring}-${i}-${li}`;
      const [ax, ay] = polar(rj, -STEP / 2), [bx, by] = polar(rj, STEP / 2);
      const arc = document.createElementNS(ns, 'path');
      arc.setAttribute('id', id);
      arc.setAttribute('d', `M ${ax} ${ay} A ${rj} ${rj} 0 0 1 ${bx} ${by}`);
      defs.appendChild(arc);

      const text = document.createElementNS(ns, 'text');
      text.setAttribute('class', cls + ' mark-word');
      text.dataset.index = i;
      text.style.setProperty('--seg-color', LP_COLORS[i % 4]);  // its glow, when marked
      text.setAttribute('transform', `rotate(${i * STEP}, ${CX}, ${CY})`);
      text.setAttribute('dominant-baseline', 'central');
      text.style.fontSize = fit.size.toFixed(2) + 'px';
      text.style.strokeWidth = Math.max(2, fit.size * .2).toFixed(2) + 'px';

      const tp = document.createElementNS(ns, 'textPath');
      tp.setAttribute('href', '#' + id);
      tp.setAttributeNS(XLINK, 'xlink:href', '#' + id);   // older WebKit
      tp.setAttribute('startOffset', '50%');
      tp.textContent = line.text;
      text.appendChild(tp);
      group.appendChild(text);
    });
  });
}

/* ================= STATE & FORMULA ================= */

const state = {
  outer: { angle: 0, group: outerG },
  inner: { angle: 0, group: innerG }
};
function applyRotation(ring) {
  const s = state[ring];
  s.group.setAttribute('transform', `rotate(${s.angle}, ${CX}, ${CY})`);
  if (ring === numTrack) turnNumRing();
}
function selectedIndex(ring) {
  return ((Math.round(-state[ring].angle / STEP) % 12) + 12) % 12;
}
/* ---- The counting ring -------------------------------------------------
   Twelve numerals on their own circle outside the wheel, past the rim and
   past the tip of the needle. They are not a third wheel and they never turn
   by themselves: they are whichever wheel is being handled, counted off, so a
   number always stands over the sector it names.

   `numTrack` is the wheel they are currently reading. It changes the moment a
   hand takes hold of the other one — on the grab, not on the release, because
   by then the numbers are already being watched. If the two wheels stand at
   different angles that change is a jump, so the ring dips out and comes back
   in its new place rather than sliding round to it: a slide would read as the
   numbers turning of their own accord, which is the one thing they must never
   look like they are doing. */
const NUM_RING_R = 382;        // numeral centres, in user units
const NUM_SWITCH_MS = 180;     // matches the opacity transition in .num-ring
let numTrack = 'outer';        // the wheel the numbers are reading
let numPending = null;         // the one they are on their way to, mid-fade
let numSwitchTimer = null;

function buildNumRing() {
  numRingG.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('class', 'wheel-num');
    t.dataset.index = i;
    t.setAttribute('transform', `rotate(${i * STEP}, ${CX}, ${CY})`);
    t.setAttribute('x', CX);
    t.setAttribute('y', CY - NUM_RING_R);
    t.setAttribute('dominant-baseline', 'central');
    t.textContent = i + 1;
    numRingG.appendChild(t);
  }
}

function turnNumRing() {
  numRingG.setAttribute('transform',
    `rotate(${state[numTrack].angle}, ${CX}, ${CY})`);
}

function trackNumRing(ring) {
  if (ring === (numPending ?? numTrack)) return;    // already going there
  /* Whatever was in flight is over: the hand moved again. Taking hold of the
     wheel the ring is already on, mid-fade, has to land here too — otherwise
     the pending switch fires afterwards and carries the numbers off to the
     wheel nobody is touching. */
  clearTimeout(numSwitchTimer);
  numPending = null;
  /* Both wheels on the same notch: nothing would move, so there is nothing to
     hide — the ring just changes what it is following. */
  if (Math.abs(state[ring].angle - state[numTrack].angle) < .01 || reduceMotion()) {
    numTrack = ring;
    numRingG.classList.remove('switching');
    turnNumRing();
    return;
  }
  numPending = ring;
  numRingG.classList.add('switching');
  numSwitchTimer = setTimeout(() => {
    numTrack = ring;                    // the numbers move while they are out
    numPending = null;
    turnNumRing();
    numRingG.classList.remove('switching');
  }, NUM_SWITCH_MS);
}

buildNumRing();
turnNumRing();

/* The book's formula: LP1 + LP2 - 1, wrapped at 12 (0-based here). */
function resultLP(pIdx, eIdx) {
  return (pIdx + eIdx) % 12;
}

/* SVG has no z-index: the selected segment's wider halo would be painted over
   by the sectors drawn after it, so lift it and its label to the end of the
   ring group. */
const raised = { outer: -1, inner: -1 };
function raiseActive(group, ring, idx) {
  if (raised[ring] === idx) return;
  raised[ring] = idx;
  group.querySelectorAll(`[data-index="${idx}"]`)
    .forEach(el => group.appendChild(el));
}

/* The hub announces a new pairing: lamps chase round the rim, then it blooms. */
const hubEl = document.getElementById('hub');
let lastPair = null;
function pulseHub(key) {
  if (lastPair === key) return;                 // language switch, re-snap to the same notch
  const first = lastPair === null;
  lastPair = key;
  if (first) return;                            // no fanfare on the initial render
  hubEl.classList.add('lit');                   // stays breathing from here on
  if (reduceMotion()) return;
  hubEl.classList.remove('pulse');
  void hubEl.offsetWidth;                       // restart the animation
  hubEl.classList.add('pulse');
}
hubEl?.addEventListener('animationend', ev => {
  if (ev.animationName === 'rim-fade') hubEl.classList.remove('pulse');   // last one out
});

function updateHub() {
  const p = selectedIndex('outer');
  const e = selectedIndex('inner');
  const r = resultLP(p, e);
  pulseHub(p + ':' + e);
  markOnChange(p + ':' + e);
  raiseActive(outerG, 'outer', p);
  raiseActive(innerG, 'inner', e);
  outerG.querySelectorAll('.sector-outer').forEach(el =>
    el.classList.toggle('active', +el.dataset.index === p));
  outerG.querySelectorAll('.label-outer').forEach(el =>
    el.classList.toggle('active-label', +el.dataset.index === p));
  innerG.querySelectorAll('.sector-inner').forEach(el =>
    el.classList.toggle('active', +el.dataset.index === e));
  innerG.querySelectorAll('.label-inner').forEach(el =>
    el.classList.toggle('active-label', +el.dataset.index === e));

  writeResult(REFLECT[lang](LP()[e].area, LP()[p].label, r + 1));
}

/* ---- The result inside the ball ---------------------------------------
   Same rules as the sectors — atoms, hyphenation, largest size that fits —
   against a circle instead of a wedge. A line's room here depends on how far
   it sits from the middle: (w/2)² + y² ≤ limit², so the middle lines may run
   wide while the top and bottom ones must be short. That is what fills a
   circle, and it is why the breaks are searched per line rather than left to
   the browser's wrapping. */
const resultEl = document.getElementById('resultText');
const readMoreEl = document.getElementById('readMoreBtn');
/* Budget: LEAD + BUDGET + the .34s each letter takes ≈ 940ms, so the sentence
   is always fully formed inside a second however long it is. */
const LETTER_MS = 17, LETTER_LEAD = 60, LETTER_BUDGET = 540;
const FIT_MARGIN = .93;      // fraction of the radius the text may reach
const FIT_SAFETY = .98;      // canvas advance vs. rendered inline-blocks
const FIT_LH = 1.24;         // line height, matching the CSS
const FIT_MAXLINES = 6;

/* Canvas measurement: no layout at all, and it reads the element's real font.
   Built once per fit — the style read is the expensive part, not measureText. */
let hubCtx = null;
function hubMeasureFn() {
  const cs = getComputedStyle(resultEl);
  if (!hubCtx) hubCtx = document.createElement('canvas').getContext('2d');
  hubCtx.font = `${cs.fontStyle} ${cs.fontWeight} 100px ${cs.fontFamily}`;
  const cache = new Map();
  return t => {
    if (!cache.has(t)) cache.set(t, hubCtx.measureText(t).width);
    return cache.get(t);
  };
}

/* Greedily fill `limits.length` lines, each with its own width allowance.
   Returns null if the atoms do not all land inside them. */
function fillLines(atoms, size, limits, measure) {
  const lines = [];
  let from = 0;
  for (let j = 0; j < limits.length && from < atoms.length; j++) {
    let to = from + 1, line = lineOf(atoms, from, to, measure);
    while (to < atoms.length) {
      const next = lineOf(atoms, from, to + 1, measure);
      if (next.w * size / 100 > limits[j]) break;
      line = next; to++;
    }
    if (line.w * size / 100 > limits[j]) return null;   // one atom already too wide
    lines.push(line);
    from = to;
  }
  return from >= atoms.length ? lines : null;
}

/* Width available to each of `n` lines, given the button parked underneath. */
function hubLimits(n, size, limit, btnH, gap) {
  const lead = FIT_LH * size;
  const total = n * lead + (btnH ? gap + btnH : 0);
  const limits = [];
  for (let j = 0; j < n; j++) {
    const y = -total / 2 + lead * (j + .5);
    const far = Math.abs(y) + lead / 2;                 // the line's outer edge
    const room = limit * limit - far * far;
    if (room <= 0) return null;
    limits.push(2 * Math.sqrt(room) * FIT_SAFETY);
  }
  return { limits, total };
}

function fitHubBlock(text, R) {
  const limit = R * FIT_MARGIN;
  const gap = parseFloat(getComputedStyle(hubEl).rowGap) || 0;
  const btnW = readMoreEl.offsetWidth, btnH = readMoreEl.offsetHeight;
  const measure = hubMeasureFn();
  const plain = atomize(text, false, measure);
  const hyph = atomize(text, true, measure);

  const attempt = (atoms, size) => {
    for (let n = 1; n <= FIT_MAXLINES; n++) {
      const shape = hubLimits(n, size, limit, btnH, gap);
      if (!shape) continue;
      // the button sits at the bottom of the stack and must clear the rim too
      if ((btnW / 2) ** 2 + (shape.total / 2) ** 2 > limit * limit) continue;
      const lines = fillLines(atoms, size, shape.limits, measure);
      if (lines) return lines;
    }
    return null;
  };
  const search = atoms => {
    let lo = R * .05, hi = R * .34, at = null;
    for (let i = 0; i < 12; i++) {
      const mid = (lo + hi) / 2;
      const lines = attempt(atoms, mid);
      if (lines) { lo = mid; at = lines; } else hi = mid;
    }
    return at ? { size: lo, lines: at } : null;
  };

  const plainFit = search(plain);
  const hyphFit = search(hyph);
  // hyphenation only earns its keep if it buys real size
  if (hyphFit && (!plainFit || hyphFit.size > plainFit.size * HYPH_GAIN)) return hyphFit;
  return plainFit || { size: R * .05, lines: [{ text }] };
}

/* Sets the hub text one letter at a time, on the lines the fit chose. */
let resultText = '';
function writeResult(text) {
  resultText = text;
  const R = Math.min(hubEl.clientWidth, hubEl.clientHeight) / 2;
  if (!R) return;
  const fit = fitHubBlock(text, R);
  resultEl.style.fontSize = fit.size.toFixed(2) + 'px';

  /* The cadence is derived, not fixed: a long sentence tightens its stagger so
     the whole reveal always lands inside LETTER_BUDGET. */
  const ticks = text.replace(/\s+/g, ' ').length;
  const gap = Math.min(LETTER_MS, LETTER_BUDGET / Math.max(1, ticks - 1));
  const frag = document.createDocumentFragment();
  let i = 0;
  fit.lines.forEach(line => {
    const row = document.createElement('span');
    row.className = 'line';
    /* Spans are built even when motion is reduced — the CSS drops the
       animation and they simply render. */
    for (const ch of line.text) {
      const letter = document.createElement('span');
      letter.className = 'ch';
      letter.textContent = ch;
      letter.style.animationDelay = (LETTER_LEAD + i++ * gap).toFixed(1) + 'ms';
      row.appendChild(letter);
    }
    frag.appendChild(row);
  });
  resultEl.textContent = '';
  resultEl.appendChild(frag);
}

function fitHubText() { if (resultText) writeResult(resultText); }

let fitRaf = null;
window.addEventListener('resize', () => {
  if (fitRaf) cancelAnimationFrame(fitRaf);
  fitRaf = requestAnimationFrame(fitHubText);
});
/* Everything is measured, so nothing can be trusted until Marcellus is in:
   the fallback face has different metrics. Re-measure and rebuild once. */
if (document.fonts) document.fonts.ready.then(() => {
  textWidths.clear();
  buildRing(outerG, 'outer');
  buildRing(innerG, 'inner');
  applyRotation('outer');
  applyRotation('inner');
  updateHub();                  // rewrites and refits the hub text
});

/* ================= ROTATION MOTION ================= */

const reduceMotion = () => matchMedia('(prefers-reduced-motion: reduce)').matches;

/* Settling after a drag: run out and ease into the notch with a hint of overshoot. */
function easeSettle(t) {
  const b = 1.1, u = t - 1;
  return 1 + (b + 1) * u * u * u + b * u * u;
}
/* A stepped turn: the wheel winds back a touch, rolls forward, rocks into place. */
function easeRoll(t) {
  const WIND = .18, back = 1.2;
  if (t < WIND) return -0.055 * Math.sin((t / WIND) * Math.PI / 2);
  const u = (t - WIND) / (1 - WIND) - 1;
  return -0.055 + 1.055 * (1 + (back + 1) * u * u * u + back * u * u);
}

const isSmall = () => matchMedia('(max-width: 520px)').matches;

/* While a wheel is in motion the page goes into a lighter drawing mode
   (see `body.spinning` in the CSS): on phones the neon halos are the most
   expensive thing on screen, and re-rasterising 24 of them every frame is what
   made the turn stutter. Both rings can move at once, so the flag is counted —
   but counted by *asking the rings*, never by incrementing. A ref count that
   drifts up by one (a second finger landing mid-drag used to do exactly that)
   sticks the page in the cheap drawing mode for the rest of the session, which
   costs the halos and silences the marker with nothing on screen to explain
   why. Derived state cannot drift. */
let spinners = 0;
function setSpinning() {
  spinners = (state.outer.spinning ? 1 : 0) + (state.inner.spinning ? 1 : 0);
  document.body.classList.toggle('spinning', spinners > 0);
}
function beginSpin(s) { s.spinning = true;  setSpinning(); }
function endSpin(s)   { s.spinning = false; setSpinning(); }

function animateTo(ring, target, dur, ease) {
  const s = state[ring];
  if (s.raf) cancelAnimationFrame(s.raf);
  s.target = target;
  const from = s.angle, delta = target - from;
  const finish = () => {
    s.raf = null; s.target = null; endSpin(s);
    s.angle = target; applyRotation(ring); updateHub();
  };
  if (!delta || reduceMotion()) { finish(); return; }
  beginSpin(s);
  const t0 = performance.now();
  s.raf = requestAnimationFrame(function tick(now) {
    const t = Math.min((now - t0) / dur, 1);
    s.angle = from + delta * ease(t);
    applyRotation(ring);
    if (t < 1) s.raf = requestAnimationFrame(tick);
    else finish();
  });
}

function snap(ring) {
  animateTo(ring, Math.round(state[ring].angle / STEP) * STEP,
            isSmall() ? 320 : 420, easeSettle);
}

/* One notch in `dir`, queued off the pending target so rapid presses stack.
   Buttons and arrow keys come through here, so this is where they hand the
   counting ring over — the same way a hand on the wheel does. */
function step(ring, dir) {
  const s = state[ring];
  trackNumRing(ring);
  const base = s.target != null ? s.target : Math.round(s.angle / STEP) * STEP;
  animateTo(ring, base + STEP * dir, isSmall() ? 420 : 560, easeRoll);
}

/* ================= THE MARKER =================
   The page's one way of saying "look here": a white border swells around a
   thing and falls back. See the MARKER block in the CSS for the two flavours
   (SVG stroke / HTML outline) — this side is only timing.

     markPulse(el)            one beat, now
     markPulse(el, 480)       one beat, in 480ms
     markPulse(el, 0, false)  one beat even mid-drag (ignores the quiet rules)

   Used here for two jobs. Periodically, the two selected wedges and the ball
   pulse in turn, outer → inner → centre, walking the eye the way the result is
   read — "you are on these". And when the result changes they are all marked
   as one instead: a single light runs the whole way round the pair and the
   ball together, then everything pulses at the same instant.

   A station is not one flash but a small movement passing through the wedge:
   the wedge lights first and the words follow, taking the attention over as
   the sector settles. The two overlap on purpose — the light is handed along
   rather than restarted. */
const MARK_MS     = 1050;    // one beat; matches --mark-ms in the CSS
const MARK_GAP    = 480;     // each beat trails the one before it
const MARK_SWEEP  = 950;     // the light's run around the group
/* A full round is a walk of about 2.6s. The gap is set from what is left
   over: any shorter and the next round arrives while the last is settling. */
const MARK_EVERY  = 13000;
const MARK_FIRST  = 2600;    // the first hint, shortly after the page settles
/* When the words take over from the wedge. Early enough that the two are
   briefly lit together — the overlap is the hand-off. */
const MARK_HANDOFF = Math.round(MARK_MS * 0.78);

/* `ms` overrides the length of this one beat. The CSS reads its duration from
   --mark-ms, so setting that on the element is enough to make a single pulse
   quicker than the rest. */
function markPulse(el, delay = 0, quietly = true, ms = MARK_MS) {
  setTimeout(() => {
    if (!el || !el.isConnected) return;           // rebuilt out from under us
    if (quietly && !markAllowed()) return;        // the moment passed
    el.classList.remove('mark-pulse');
    if (ms !== MARK_MS) el.style.setProperty('--mark-ms', ms + 'ms');
    el.getBoundingClientRect();                   // reflow, so a re-pulse restarts
    el.classList.add('mark-pulse');
    setTimeout(() => {
      el.classList.remove('mark-pulse');
      if (ms !== MARK_MS) el.style.removeProperty('--mark-ms');
    }, ms + 60);
  }, delay);
}

/* The selected wedge of a ring, which is always the one under the marker, and
   its label. They are marked together, so they are fetched together. */
function selectedParts(ring) {
  const group = ring === 'outer' ? outerG : innerG;
  const idx = selectedIndex(ring);
  return {
    sector: group.querySelector(`.sector-${ring}[data-index="${idx}"]`),
    /* One text element per line of the label, all lit together. */
    words: [...group.querySelectorAll(`.label-${ring}[data-index="${idx}"]`)]
  };
}

/* One station of the walk: a wedge, then its words as the wedge settles. */
function markStation(ring, delay) {
  const { sector, words } = selectedParts(ring);
  markPulse(sector, delay);
  words.forEach(el => markPulse(el, delay + MARK_HANDOFF));
}

/* Silent while the user is already busy — mid-turn, reading a card, or away —
   and off entirely for anyone who asked for less motion. */
function markAllowed() {
  return !reduceMotion() && !document.hidden && !drag && spinners === 0 &&
         !overlay.classList.contains('open');
}

/* ---- The sweep: one light around the pair and the ball together ----
   The outline is the union of the two chosen wedges and the ball, and it is
   the same shape every time: whatever is selected sits under the marker at the
   top, so this traces the top wedge from the ball's rim outwards, round the
   outer edge, back down, then the long way round the ball. Drawn just clear of
   both (the ball is an HTML element painted over the SVG, so hugging its rim
   exactly would hide half the stroke). */
const sweepG = document.getElementById('markSweep');
const hubRing = document.getElementById('hubRing');
function markSweepPath() {
  const a1 = -STEP / 2, a2 = STEP / 2;
  const rect = hubEl.getBoundingClientRect();
  const stage = svg.getBoundingClientRect();
  const rh = (rect.width / stage.width) * 700 / 2 + 5;   // ball's rim, plus air
  const ro = OUTER_R2 + 4;
  const [ix, iy] = polar(rh, a1), [ox, oy] = polar(ro, a1);
  const [px, py] = polar(ro, a2), [qx, qy] = polar(rh, a2);
  return `M ${ix} ${iy} L ${ox} ${oy} A ${ro} ${ro} 0 0 1 ${px} ${py} ` +
         `L ${qx} ${qy} A ${rh} ${rh} 0 1 1 ${ix} ${iy} Z`;
}
function markSweepRun() {
  if (!sweepG) return;
  sweepG.querySelector('path').setAttribute('d', markSweepPath());
  sweepG.classList.remove('run');
  sweepG.getBoundingClientRect();
  sweepG.classList.add('run');
  setTimeout(() => sweepG.classList.remove('run'), MARK_SWEEP + 60);
}

/* A new result: the light runs the group, then all of it flares together —
   both wedges and the ball, on one beat. */
function markGroupNow() {
  if (!markAllowed()) return;
  markSweepRun();
  const together = MARK_SWEEP - 120;              // land as the light closes
  markStation('outer', together);
  markStation('inner', together);
  markPulse(hubRing, together);
}

/* The standing reminder: the same pieces, one station after another, outward
   to in — outer wedge, inner wedge, then the ball. */
function markRound() {
  if (!markAllowed()) return;
  markStation('outer', 0);
  markStation('inner', MARK_GAP);
  const last = MARK_GAP * 2 + MARK_HANDOFF;          // the ball, after the last word
  markPulse(hubRing, last);
}

let markTimer = null;
function scheduleMark(delay = MARK_EVERY) {
  clearTimeout(markTimer);
  markTimer = setTimeout(() => { markRound(); scheduleMark(); }, delay);
}
/* A new pairing is its own reminder — mark the group at once and restart the
   clock. Keyed on the pair, so a language switch (same notch, new words) stays
   quiet. The next periodic round is pushed out past the sweep, so the two
   never overlap. */
let lastMarkPair = null;
function markOnChange(key) {
  if (lastMarkPair === key) return;
  const first = lastMarkPair === null;
  lastMarkPair = key;
  if (first) return;                    // the initial render gets MARK_FIRST
  markGroupNow();
  scheduleMark(MARK_EVERY + MARK_SWEEP);
}
/* A backgrounded tab holds its timer but skips the round; pick it up on return. */
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) scheduleMark();
});

/* ================= DRAG + TAP ================= */

let drag = null;

function eventInfo(ev) {
  const rect = svg.getBoundingClientRect();
  const scale = 700 / rect.width;
  const x = (ev.clientX - rect.left) * scale - CX;
  const y = (ev.clientY - rect.top) * scale - CY;
  return { angle: Math.atan2(y, x) * 180 / Math.PI, dist: Math.hypot(x, y) };
}

svg.addEventListener('pointerdown', ev => {
  if (drag) return;                     // one finger turns the wheel; ignore the rest
  const { angle, dist } = eventInfo(ev);
  let ring = null;
  if (dist >= INNER_R1 && dist < OUTER_R1) ring = 'inner';
  else if (dist >= OUTER_R1 && dist <= OUTER_R2 + 6) ring = 'outer';
  if (!ring) return;
  const s = state[ring];
  if (s.raf) { cancelAnimationFrame(s.raf); s.raf = null; s.target = null; }
  trackNumRing(ring);                 // the numbers belong to whatever is held
  beginSpin(s);                       // dragging is motion too — keep it light
  drag = { ring, lastAngle: angle, startX: ev.clientX, startY: ev.clientY, moved: false };
  svg.setPointerCapture(ev.pointerId);
});

svg.addEventListener('pointermove', ev => {
  if (!drag) return;
  if (Math.hypot(ev.clientX - drag.startX, ev.clientY - drag.startY) > 6) drag.moved = true;
  if (!drag.moved) return;
  const { angle } = eventInfo(ev);
  let delta = angle - drag.lastAngle;
  if (delta > 180) delta -= 360;
  if (delta < -180) delta += 360;
  state[drag.ring].angle += delta;
  drag.lastAngle = angle;
  applyRotation(drag.ring);
});

function endDrag(ev) {
  if (!drag) return;
  if (drag.moved) {
    snap(drag.ring);                  // hands the spin flag over to the settle
  } else {
    endSpin(state[drag.ring]);
    // Treat as a tap: identify the sector under the finger and open its card
    const { angle } = eventInfo(ev);
    const fromTop = (angle + 90 + 360) % 360;
    const idx = ((Math.round((fromTop - state[drag.ring].angle) / STEP) % 12) + 12) % 12;
    openCategoryModal(idx, drag.ring);
  }
  drag = null;
}
svg.addEventListener('pointerup', endDrag);
/* Any way the gesture can end without a pointerup — the browser taking the
   touch for a scroll, the finger leaving the surface, capture lost to another
   element — has to put the ring down too, or it stays "in motion" forever. */
function abortDrag() {
  if (!drag) return;
  if (drag.moved) snap(drag.ring); else endSpin(state[drag.ring]);
  drag = null;
}
svg.addEventListener('pointercancel', abortDrag);
svg.addEventListener('lostpointercapture', abortDrag);

document.querySelectorAll('.control-block button').forEach(btn => {
  btn.addEventListener('click', () => {
    step(btn.dataset.ring, +btn.dataset.dir);
  });
});

/* Keyboard: ←/→ rotate the outer wheel, ↑/↓ rotate the inner wheel */
document.addEventListener('keydown', ev => {
  if (overlay.classList.contains('open')) return;      // let Esc handler manage the modal
  const map = {
    ArrowLeft:  ['outer',  1],
    ArrowRight: ['outer', -1],
    ArrowUp:    ['inner', -1],
    ArrowDown:  ['inner',  1]
  };
  const m = map[ev.key];
  if (!m) return;
  ev.preventDefault();
  step(m[0], m[1]);
});

/* ================= MODALS ================= */

const overlay = document.getElementById('overlay');

function field(k, v) {
  return `<div class="field"><div class="k">${k}</div><div class="v">${v}</div></div>`;
}

function openCategoryModal(idx, ring) {
  const item = LP()[idx];
  document.getElementById('modalEyebrow').textContent =
    `${idx + 1}. ${T().lpWord}` + (ring === 'outer' ? ` · ${item.label}` : ` · ${item.area}`);
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalBody').innerHTML =
    field(T().catKeys, item.keys) +
    field(T().catPeople, item.people) +
    field(T().catBody, item.body) +
    field(T().catSympt, item.sympt) +
    field(T().catCar, item.car) +
    field(T().catHome, item.home);
  overlay.classList.add('open');
  document.getElementById('closeModal').focus();
}

/* ---- Original book text rendering ---- */

const REFLECT = {
  de: (area, label, n) => `Die ${area} Ihrer ${label} spiegelt Ihr ${n}. Lebensprinzip wider.`,
  en: (area, label, n) => `The ${area.toLowerCase()} of your ${label.toLowerCase()} reflects your ${n}${ordEn(n)} life principle.`,
  ru: (area, label, n) => `${area} — ${label} — отражает ваш ${n}-й жизненный принцип.`,
  bg: (area, label, n) => `${area} — ${label} — отразява вашия ${n}-и жизнен принцип.`
};
function ordEn(n){ const s=['th','st','nd','rd'], v=n%100; return s[(v-20)%10]||s[v]||s[0]; }
const BOOK_BTN = {
  de: 'Originaltext aus dem Buch',
  en: 'Original text from the book',
  ru: 'Оригинальный текст из книги',
  bg: 'Оригинален текст от книгата'
};
const FIELD_L = {
  de: { a:'Symbolische Entsprechung Ihrer Außenwelt', i:'Symbolische Entsprechung Ihrer Innenwelt',
        b:'Biologische Entsprechung', s:'Mögliche Lösungen' },
  en: { a:'Symbolic correspondence of your outer world', i:'Symbolic correspondence of your inner world',
        b:'Biological correspondence', s:'Possible solutions' },
  ru: { a:'Символическое соответствие внешнего мира', i:'Символическое соответствие внутреннего мира',
        b:'Биологическое соответствие', s:'Возможные решения' },
  bg: { a:'Символично съответствие на външния свят', i:'Символично съответствие на вътрешния свят',
        b:'Биологично съответствие', s:'Възможни решения' }
};

function bookHTML(p, e) {
  const sec = BOOK_DE[`${p}-${e}`];
  if (!sec) return '';
  const L = FIELD_L[lang];
  let html = '';
  if (sec.m && sec.m.length) html += sec.m.map(t => `<p class="motto">${t}</p>`).join('');
  html += field(L.a, sec.a) + field(L.i, sec.i) + field(L.b, sec.b);
  html += `<div class="impulse"><div class="k">${L.s}</div>`;
  let listOpen = false;
  sec.s.forEach(ln => {
    if (/^(je mehr|desto)/i.test(ln)) {
      if (listOpen) { html += '</ul>'; listOpen = false; }
      html += `<p class="lead">${ln}</p>`;
    } else {
      if (!listOpen) { html += '<ul>'; listOpen = true; }
      html += `<li>${ln}</li>`;
    }
  });
  if (listOpen) html += '</ul>';
  if (lang !== 'de') html += `<div class="note">${T().deNote}</div>`;
  html += '</div>';
  return html;
}

function openResultModal() {
  const p = selectedIndex('outer');
  const e = selectedIndex('inner');
  const r = resultLP(p, e);
  // eyebrow keeps the formula; title is the reflect-sentence pattern
  document.getElementById('modalEyebrow').textContent =
    `${e + 1} + ${p + 1} − 1 → ${r + 1}. ${T().lpWord}`;
  document.getElementById('modalTitle').textContent =
    REFLECT[lang](LP()[e].area, LP()[p].label, r + 1);
  // body: book text from the quotation (motto) down to the Je-mehr…desto block,
  // WITHOUT the Themen/keys field. bookHTML already omits Themen.
  const bh = bookHTML(p, e);
  document.getElementById('modalBody').innerHTML =
    bh || `<p class="note">${T().bookNote}</p>`;
  overlay.classList.add('open');
  document.getElementById('closeModal').focus();
}

document.getElementById('readMoreBtn').addEventListener('click', openResultModal);
document.getElementById('closeModal').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', ev => { if (ev.target === overlay) overlay.classList.remove('open'); });
document.addEventListener('keydown', ev => { if (ev.key === 'Escape') overlay.classList.remove('open'); });

/* ================= LANGUAGE ================= */

function applyLanguage(newLang) {
  lang = newLang;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-switch button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang));
  document.getElementById('uiTitle').textContent = T().title;
  document.getElementById('uiSubtitle').textContent = T().subtitle;
  document.getElementById('uiAlignment').textContent = T().alignment;
  document.getElementById('readMoreBtn').textContent = T().readMore;
  document.getElementById('soundLabel').textContent = T().sound;
  buildRing(outerG, 'outer');
  buildRing(innerG, 'inner');
  applyRotation('outer');
  applyRotation('inner');
  updateHub();
}

document.querySelectorAll('.lang-switch button').forEach(btn =>
  btn.addEventListener('click', () => applyLanguage(btn.dataset.lang)));

/* ================= STARS + INIT ================= */

const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('span');
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = (Math.random() * 4) + 's';
  s.style.transform = `scale(${0.5 + Math.random()})`;
  starsEl.appendChild(s);
}

/* ================= THE DRONE =================
   There is no audio file. A recording of something this slow would be a large
   download of mostly nothing, and it would loop — and a loop point is the one
   event the ear always finds. This is a few oscillators and a filter instead:
   a handful of lines, no asset, and it never repeats.

   What is playing:
     · three sine voices a fifth and an octave apart, detuned by a couple of
       cents so they beat against each other very slowly. That beating is the
       whole character — it is what makes a chord sound like a place.
     · one lowpass filter over the lot, its cutoff drifting on a 40s cycle, so
       the timbre opens and closes like something breathing in a large room.
     · single notes from a pentatonic set, struck every 9 to 22 seconds at low
       volume, each with a long decay. Sparse enough that they read as events
       rather than as a melody.
     · a convolution reverb built from decaying noise, so everything sits at a
       distance rather than against the ear.

   All of it stays under a master gain that fades in over eight seconds. Volume
   is deliberately low: this should be noticed only when it stops. */
const SOUND_KEY = 'cdl-sound';
const soundBtn = document.getElementById('soundBtn');
let audio = null;                              // built on first use, never twice

function buildAudio() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  const ctx = new Ctx();

  const master = ctx.createGain();
  master.gain.value = 0;                       // faded up by startAudio
  master.connect(ctx.destination);

  /* Reverb: two seconds of noise decaying exponentially is a passable room. */
  const len = ctx.sampleRate * 2.6;
  const imp = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = imp.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6);
    }
  }
  const verb = ctx.createConvolver();
  verb.buffer = imp;
  const verbGain = ctx.createGain();
  verbGain.gain.value = .5;
  verb.connect(verbGain).connect(master);

  /* The drone, through its own slowly opening filter. */
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 340;
  lp.Q.value = .6;
  lp.connect(master);
  lp.connect(verb);

  const drift = ctx.createOscillator();        // the 40s breath on the cutoff
  const driftAmt = ctx.createGain();
  drift.frequency.value = 1 / 40;
  driftAmt.gain.value = 190;
  drift.connect(driftAmt).connect(lp.frequency);
  drift.start();

  [[55, 0], [82.5, +3], [110, -2.5]].forEach(([hz, cents]) => {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = hz;
    osc.detune.value = cents;
    const g = ctx.createGain();
    g.gain.value = hz < 100 ? .22 : .12;       // the low voice carries it
    osc.connect(g).connect(lp);
    osc.start();
  });

  /* The occasional note. A minor pentatonic on A, three octaves up from the
     drone, so it floats well clear of it. */
  const NOTES = [440, 523.25, 587.33, 659.25, 783.99, 880, 1046.5];
  let bellTimer = null;
  function bell() {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    osc.type = 'sine';
    osc.frequency.value = NOTES[Math.floor(Math.random() * NOTES.length)];
    const t = ctx.currentTime, dur = 5 + Math.random() * 4;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(.06, t + .8);        // struck softly, slowly
    g.gain.exponentialRampToValueAtTime(.0001, t + dur);
    osc.connect(g);
    if (pan) { pan.pan.value = Math.random() * 1.6 - .8; g.connect(pan); pan.connect(verb); pan.connect(master); }
    else { g.connect(verb); g.connect(master); }
    osc.start(t);
    osc.stop(t + dur + .1);
    bellTimer = setTimeout(bell, 9000 + Math.random() * 13000);
  }
  bellTimer = setTimeout(bell, 4000 + Math.random() * 5000);

  return {
    ctx, master,
    stop() { clearTimeout(bellTimer); }
  };
}

const SOUND_PEAK = .16;
function startAudio() {
  if (!audio) audio = buildAudio();
  if (!audio) return false;
  audio.ctx.resume();
  const t = audio.ctx.currentTime;
  audio.master.gain.cancelScheduledValues(t);
  audio.master.gain.setValueAtTime(audio.master.gain.value, t);
  audio.master.gain.linearRampToValueAtTime(SOUND_PEAK, t + 8);   // arrives, rather than starts
  return true;
}
function stopAudio() {
  if (!audio) return;
  const t = audio.ctx.currentTime;
  audio.master.gain.cancelScheduledValues(t);
  audio.master.gain.setValueAtTime(audio.master.gain.value, t);
  audio.master.gain.linearRampToValueAtTime(0, t + 1.4);
}

function setSound(on, remember = true) {
  soundBtn.classList.toggle('on', on);
  soundBtn.setAttribute('aria-pressed', String(on));
  if (remember) { try { localStorage.setItem(SOUND_KEY, on ? '1' : '0'); } catch (e) {} }
  if (on) { if (!startAudio()) soundBtn.classList.remove('on'); }
  else stopAudio();
}
soundBtn.addEventListener('click', () => setSound(!soundBtn.classList.contains('on')));

/* A page may not make noise until it has been touched, so the drone waits for
   the first gesture — and only then, and only if it was left on. Silence is
   the default for anyone arriving for the first time: sound on arrival is the
   web's rudest habit. */
let wantsSound = false;
try { wantsSound = localStorage.getItem(SOUND_KEY) === '1'; } catch (e) {}
if (wantsSound) {
  const wake = () => { setSound(true, false); off(); };
  const off = () => ['pointerdown', 'keydown'].forEach(e =>
    document.removeEventListener(e, wake));
  ['pointerdown', 'keydown'].forEach(e =>
    document.addEventListener(e, wake, { once: false }));
}
/* Leaving the tab takes the sound with it. */
document.addEventListener('visibilitychange', () => {
  if (!audio) return;
  if (document.hidden) stopAudio();
  else if (soundBtn.classList.contains('on')) startAudio();
});

applyLanguage('de');
scheduleMark(MARK_FIRST);
</script>
